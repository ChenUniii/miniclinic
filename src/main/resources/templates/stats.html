<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>統計資訊 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #0F2443; border-bottom: 3px solid #14B8A6; padding-bottom: 8px; }
        nav { background: #0F2443; padding: 12px; border-radius: 8px; margin-bottom: 24px; }
        nav a { color: white; margin-right: 20px; text-decoration: none; font-weight: bold; }
        nav a:hover { color: #5EEAD4; }
        .stat-card { background: #F8FAFC; padding: 24px; border-left: 5px solid #14B8A6; border-radius: 4px; display: inline-block; min-width: 200px; text-align: center; margin-top: 20px; }
        .stat-card h2 { margin: 0; color: #64748B; font-size: 18px; }
        .stat-card .number { font-size: 36px; font-weight: bold; color: #0F2443; margin-top: 10px; }
    </style>
</head>
<body>
    <nav>
        <a th:href="@{/}">首頁</a>
        <a th:href="@{/doctors}">醫師清單</a>
        <a th:href="@{/appointment/new}">線上掛號</a>
        <a th:href="@{/patients}">病歷資料</a>
        <a th:href="@{/appointments}">掛號記錄</a>
        <a th:href="@{/stats}">統計資訊</a>
        <a th:href="@{/login}">醫師登入</a>
    </nav>

    <h1>統計資訊</h1>

    <div class="stat-card">
        <h2>總掛號筆數</h2>
        <div class="number" id="totalCount">載入中...</div>
    </div>

    <script>
        fetch('/api/appointments/count')
            .then(response => response.json())
            .then(data => {
                document.getElementById('totalCount').innerText = data.count;
            });
    </script>
</body>
</html>
